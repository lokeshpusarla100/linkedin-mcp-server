services:
  - type: web
    name: daily-job-hunter
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/server.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
